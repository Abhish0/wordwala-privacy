<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Request Received — Word Wala</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f6f7fb;
    color: #1f2233;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    line-height: 1.55;
  }
  .card {
    background: #fff;
    border: 1px solid #e3e6ee;
    border-radius: 14px;
    padding: 36px 28px;
    max-width: 460px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(20, 24, 50, 0.04);
  }
  .check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #e7f6ec;
    color: #2e7d32;
    font-size: 36px;
    line-height: 64px;
    margin: 0 auto 18px;
  }
  h1 { margin: 0 0 10px; font-size: 22px; }
  p { color: #5a6079; margin: 0 0 10px; }
  a {
    display: inline-block;
    margin-top: 18px;
    color: #3F51B5;
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check">&check;</div>
    <h1>Request received</h1>
    <p>
      Thanks. We&rsquo;ve received your account deletion request and will process
      it within <strong>30 days</strong>.
    </p>
    <p>
      You&rsquo;ll get a confirmation email at the address you submitted once
      deletion is complete.
    </p>
    <a href="privacy_policy.html">Back to Privacy Policy</a>
  </div>
</body>
</html>
